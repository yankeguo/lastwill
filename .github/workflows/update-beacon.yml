name: update-beacon

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: update beacon
        run: |
          date -u +"%Y-%m-%dT%H:%M:%S.000Z" > beacon.txt
      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add beacon.txt
          git diff --cached --quiet || (git commit -m "chore: update beacon" && git push)
